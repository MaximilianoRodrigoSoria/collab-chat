apiVersion: v1
kind: Service
metadata:
  name: collab-chat-service
  namespace: collab-chat
  labels:
    app.kubernetes.io/name: collab-chat
spec:
  type: ClusterIP        # El Ingress (ingress.yaml) enruta el tráfico externo al Service
  selector:
    app: collab-chat
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
